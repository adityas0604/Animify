service: animify-backend-api
useDotenv: true
# Reads all variables from backend/.env automatically via serverless-dotenv-plugin.
#
# Required .env keys:
#   DATABASE_URL, JWT_SECRET, OPENAI_API_KEY,
#   SQS_QUEUE_URL, SQS_QUEUE_ARN, S3_BUCKET_NAME
#
# Deploy:
#   cd backend
#   npm install
#   npm install --save-dev serverless serverless-offline serverless-plugin-scripts serverless-dotenv-plugin
#   serverless deploy
#
# Tear down:
#   serverless remove

provider:
  name: aws
  runtime: nodejs20.x
  region: ${env:AWS_REGION, 'us-east-1'}
  environment:
    DATABASE_URL: ${env:DATABASE_URL}
    JWT_SECRET: ${env:JWT_SECRET}
    OPENAI_API_KEY: ${env:OPENAI_API_KEY}
    SQS_QUEUE_URL: ${env:SQS_QUEUE_URL}
    S3_BUCKET_NAME: ${env:S3_BUCKET_NAME}
  iam:
    role:
      statements:
        - Effect: Allow
          Action: sqs:SendMessage
          Resource: ${env:SQS_QUEUE_ARN}
        - Effect: Allow
          Action:
            - s3:GetObject
            - s3:DeleteObject
          Resource: arn:aws:s3:::${env:S3_BUCKET_NAME}/*

plugins:
  - serverless-esbuild
  - serverless-offline
  - serverless-plugin-scripts

custom:
  esbuild:
    bundle: true
    minify: false
    sourcemap: false
    target: node20
    platform: node
    packager: npm
    # @prisma/client contains a native query-engine binary — esbuild cannot
    # bundle native code, so we mark it external and copy the files manually.
    external:
      - '@prisma/client'
      - '.prisma/client'
    copyFiles:
      - from: 'node_modules/.prisma'
        to: 'node_modules/.prisma'

  scripts:
    hooks:
      # Must run before esbuild bundles so the correct Lambda binary is present.
      'before:package:createDeploymentArtifacts': npx prisma generate

package:
  individually: true
  patterns:
    - '!.env'
    - '!*.md'
    - '!generated/**'
    - '!manim/**'
    - '!prisma/migrations/**'

functions:

  # ── Auth ────────────────────────────────────────────────────────────────────

  signup:
    handler: handler.signup
    events:
      - httpApi:
          path: /auth/signup
          method: POST

  login:
    handler: handler.login
    events:
      - httpApi:
          path: /auth/login
          method: POST

  # ── User — videos ────────────────────────────────────────────────────────────

  getVideos:
    handler: handler.getVideos
    events:
      - httpApi:
          path: /user/videos
          method: GET

  getVideoStatus:
    handler: handler.getVideoStatus
    events:
      - httpApi:
          path: /user/videos/{id}/status
          method: GET

  # ── User — script generation & compilation ───────────────────────────────────

  generate:
    handler: handler.generate
    timeout: 29   # OpenAI call — 29 s is the API Gateway HTTP API hard max
    events:
      - httpApi:
          path: /user/generate
          method: POST

  compile:
    handler: handler.compile
    events:
      - httpApi:
          path: /user/compile
          method: POST

  # ── User — history & code ────────────────────────────────────────────────────

  getPrompts:
    handler: handler.getPrompts
    events:
      - httpApi:
          path: /user/prompts
          method: GET

  getCode:
    handler: handler.getCode
    events:
      - httpApi:
          path: /user/code
          method: GET

  clearHistory:
    handler: handler.clearHistory
    events:
      - httpApi:
          path: /user/clear-history
          method: DELETE
